const DL=["ケートゥ","金星","太陽","月","火星","ラーフ","木星","土星","水星"],DY=[7,20,6,10,7,18,16,19,17];
const FSTY={大吉:{c:"#ffd700",g:"rgba(255,215,0,.5)"},吉:{c:"#80e0a0",g:"rgba(128,224,160,.4)"},中吉:{c:"#80c0ff",g:"rgba(128,192,255,.4)"},中平:{c:"#b0b0ff",g:"rgba(176,176,255,.3)"},注意:{c:"#ffb060",g:"rgba(255,176,96,.4)"}};

function norm(v){return((v%360)+360)%360;}
function toJD(y,m,d,h=12){if(m<=2){y--;m+=12;}const A=Math.floor(y/100),B=2-A+Math.floor(A/4);return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+h/24+B-1524.5;}
function sunL(jd){const n=jd-2451545,L=(280.46+0.9856474*n)%360,g=((357.528+0.9856003*n)%360)*Math.PI/180;return norm(L+1.915*Math.sin(g)+0.02*Math.sin(2*g));}
function moonL(jd){const n=jd-2451545,L=(218.316+13.176396*n)%360,M=((134.963+13.064993*n)%360)*Math.PI/180,F=((93.272+13.22935*n)%360)*Math.PI/180,Ms=((357.528+0.9856003*n)%360)*Math.PI/180;return norm(L+6.289*Math.sin(M)-1.274*Math.sin(2*F-M)+0.658*Math.sin(2*F)-0.214*Math.sin(2*M)-0.186*Math.sin(Ms));}
function calcP(jd){const n=jd-2451545,ay=23.85+(n/365.25)*0.01396;return{sun:norm(sunL(jd)-ay),moon:norm(moonL(jd)-ay)};}
function calcLagna(lon,lat,jd,bh){const lst=(100.4606184+360.98564774*(jd-2451545)+lon)%360,ob=23.439*Math.PI/180,lr=lat*Math.PI/180,rc=((lst+bh*15)%360)*Math.PI/180;let l=Math.atan2(Math.cos(rc),-(Math.sin(rc)*Math.cos(ob)+Math.tan(lr)*Math.sin(ob)))*180/Math.PI;if(l<0)l+=360;const n=jd-2451545;return norm(l-23.85-(n/365.25)*0.01396);}
function getNak(lon){const i=Math.floor(lon/(360/27))%27,pada=Math.floor((lon%(360/27))/(360/27/4))+1;return{nak:NAKSHATRAS[i],pada};}
function getRashi(lon){return Math.floor(lon/30)%12;}
function calcDasha(mlon,by){const ni=Math.floor(mlon/(360/27)),ri=ni%9,frac=(mlon%(360/27))/(360/27),first=DY[ri]*(1-frac);const p=[];let cur=by+first;for(let i=0;i<9;i++){const idx=(ri+i)%9,y=i===0?first:DY[idx],st=i===0?by+(first-DY[ri]):cur;p.push({lord:DL[idx],start:Math.floor(i===0?by:cur),end:Math.floor(i===0?by+first:cur+y)});cur=i===0?by+first:cur+y;}return p;}
function curD(p){const yr=new Date().getFullYear();return p.find(d=>d.start<=yr&&d.end>yr)||p[p.length-1];}

function getCoords(p){for(const[c,v]of Object.entries(CITIES)){if(p.includes(c))return v;}return[135.5,35.0];}
function calcAstro(bd,bt,bp){
  const[by,bm,bd2]=bd.split('-').map(Number),[bh,bmn]=(bt||'12:00').split(':').map(Number);

    if(a==='menu'){STATE.screen='menu';STATE.result=null;STATE.err='';render();}
    if(a==='submit')doSubmit();};});}
async function doSubmit(){
  const bd=document.getElementById('bd')?.value||'';
  const bt=document.getElementById('bt')?.value||'12:00';
  const nm=document.getElementById('nm')?.value||'';
  const gd=document.getElementById('gd')?.value||'';
  const bp=document.getElementById('bp')?.value||'';
  const th=document.getElementById('th')?.value||'総合運';
  const q=document.getElementById('q')?.value||'';
  if(!bd||!q.trim()){set({err:'生年月日と相談内容を入力してください。'});return;}
  const form={name:nm,gender:gd,bd,bt,bp,theme:th,question:q};
  const astro=calcAstro(bd,bt,bp);
  const svc=STATE.svc,isPrem=svc==='premium';

  const maxTok=isPrem?2000:1500;
  const loads=isPrem?['カルマを解析中…','ダルマを読み解き中…','深層鑑定書を作成中…']:['ホロスコープを計算中…','惑星配置を分析中…','AI鑑定師が統合分析中…'];
  let li=0;set({step:'loading',err:'',loadMsg:loads[0]});
  const ti=setInterval(()=>{li=(li+1)%loads.length;STATE.loadMsg=loads[li];const el=document.querySelector('[style*="animation:pu"]');if(el)el.textContent=loads[li];},1400);
  let ai;
  try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTok,system:isPrem?SYS_PRM:SYS_STD,messages:[{role:'user',content:prompt}]})});

  clearInterval(ti);
  set({step:'result',result:{id:Date.now(),date:new Date().toLocaleString('ja-JP'),svc,form,astro,ai}});}
render();
